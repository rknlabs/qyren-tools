<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/_logos/qyren-icon-transparent-32px.png" />
    <link rel="apple-touch-icon" href="/_logos/qyren-icon-transparent-256px.png" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('qyren-theme');
          var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = saved || preferred;
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qyren Tools — Free tools for F2P monetization</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
